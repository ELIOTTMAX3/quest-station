<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/rpg-awesome@0.2.0/css/rpg-awesome.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0c0e1a;display:flex;align-items:center;justify-content:center;min-height:100vh;gap:40px;}
.wrap{position:relative;width:300px;height:340px;border:1px solid #1a2840;border-radius:12px;overflow:hidden;}
.wrap img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;object-position:center top;pointer-events:none;filter:invert(1) sepia(1) saturate(2) hue-rotate(5deg);mix-blend-mode:screen;opacity:.35;}
.slot{position:absolute;width:54px;height:54px;border-radius:10px;border:1.5px dashed #3d5a8a;background:rgba(14,21,37,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;}
.slot.occ{border-color:#c9a227;background:rgba(201,162,39,.14);}
.slot i{font-size:20px;color:#c9a227;}
.slot .lbl{font-size:7px;font-weight:700;color:#5a6a8a;text-transform:uppercase;text-align:center;max-width:50px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.slot.occ .lbl{color:#e8dcc8;}
.gl{position:absolute;left:0;right:0;border-top:1px dashed rgba(255,100,100,.2);font-size:8px;color:rgba(255,100,100,.4);padding-left:2px;z-index:10;}
</style>
</head><body>

<div class="wrap" id="w">
  <img src="silhouette-knight.png">
  <script>for(var p=10;p<100;p+=10)document.write('<div class="gl" style="top:'+p+'%">'+p+'%</div>')</script>
  <div class="slot occ" id="s-chapeau"  style="top:3px;  left:50%;transform:translateX(-50%)"><i class="ra ra-helmet"></i><span class="lbl">Casque</span></div>
  <div class="slot"     id="s-cape"     style="top:21%;  left:2px"><span class="lbl">Cape</span></div>
  <div class="slot"     id="s-amulette" style="top:21%;  right:2px"><span class="lbl">Amulette</span></div>
  <div class="slot occ" id="s-armure"   style="top:37%;  left:50%;transform:translateX(-50%)"><i class="ra ra-vest"></i><span class="lbl">Armure</span></div>
  <div class="slot occ" id="s-anneau"   style="top:53%;  left:2px"><i class="ra ra-fire-ring"></i><span class="lbl">Anneau</span></div>
  <div class="slot"     id="s-ceinture" style="top:55%;  left:50%;transform:translateX(-50%)"><span class="lbl">Ceinture</span></div>
  <div class="slot occ" id="s-bottes"   style="top:80%;  left:50%;transform:translateX(-50%)"><i class="ra ra-boot-stomp"></i><span class="lbl">Bottes</span></div>
</div>

<div style="background:#111;padding:16px;border-radius:10px;color:#ccc;font-size:11px;font-family:monospace;display:flex;flex-direction:column;gap:8px;min-width:260px;">
  <div style="color:#c9a227;font-weight:700;margin-bottom:4px;">Ajustement live</div>
  <script>
  var defs={chapeau:{top:3,left:50},cape:{top:21,left:0},amulette:{top:21,left:60},armure:{top:37,left:50},anneau:{top:53,left:0},ceinture:{top:55,left:50},bottes:{top:80,left:50}};
  Object.keys(defs).forEach(function(id){
    var d=defs[id];
    document.write('<div style="display:flex;align-items:center;gap:6px;">'
      +'<span style="width:62px;color:#c9a227;">'+id+'</span>'
      +'<label style="color:#888;font-size:10px;">top%</label>'
      +'<input id="inp-t-'+id+'" type="number" value="'+d.top+'" step="1" style="width:48px;background:#222;border:1px solid #333;color:#fff;padding:2px 4px;border-radius:4px;" oninput="upd(\''+id+'\')">'
      +'<label style="color:#888;font-size:10px;">left%</label>'
      +'<input id="inp-l-'+id+'" type="number" value="'+d.left+'" step="1" style="width:48px;background:#222;border:1px solid #333;color:#fff;padding:2px 4px;border-radius:4px;" oninput="upd(\''+id+'\')">'
      +'</div>');
  });
  </script>
  <script>
  function upd(id){
    var el=document.getElementById('s-'+id);
    var t=document.getElementById('inp-t-'+id).value;
    var l=document.getElementById('inp-l-'+id).value;
    el.style.top=t+'%';
    if(l==50){el.style.left='50%';el.style.right='';el.style.transform='translateX(-50%)';}
    else if(l>=60){el.style.right=(100-l)+'%';el.style.left='';el.style.transform='';}
    else{el.style.left=l+'%';el.style.right='';el.style.transform='';}
  }
  </script>
  <div style="margin-top:8px;color:#555;font-size:10px;">left=0 → bord gauche · left=50 → centré · left=60+ → bord droit</div>
</div>

</body></html>
