<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/rpg-awesome@0.2.0/css/rpg-awesome.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0c0e1a;font-family:system-ui,sans-serif;display:flex;align-items:flex-start;justify-content:center;padding:32px;gap:32px;min-height:100vh;}
.wrap{position:relative;width:300px;height:340px;border:1px solid #1a2840;border-radius:12px;overflow:hidden;flex-shrink:0;cursor:crosshair;}
.wrap img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;object-position:center top;pointer-events:none;filter:invert(1) sepia(1) saturate(2) hue-rotate(5deg);mix-blend-mode:screen;opacity:.35;}
.slot{position:absolute;width:54px;height:54px;border-radius:10px;border:1.5px solid #c9a227;background:rgba(201,162,39,.18);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:grab;user-select:none;z-index:10;transition:box-shadow .1s;}
.slot:active{cursor:grabbing;box-shadow:0 0 0 2px #c9a227;z-index:20;}
.slot i{font-size:18px;color:#c9a227;pointer-events:none;}
.slot .lbl{font-size:7px;font-weight:700;color:#e8dcc8;text-transform:uppercase;text-align:center;max-width:50px;pointer-events:none;}
/* Panneau résultats */
.panel{background:#111827;border:1px solid #1e2d45;border-radius:12px;padding:16px;min-width:260px;display:flex;flex-direction:column;gap:6px;}
.panel h2{font-size:11px;font-weight:700;color:#c9a227;letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px;}
.row{display:flex;align-items:center;gap:8px;font-size:11px;font-family:monospace;}
.row .name{color:#c9a227;width:68px;}
.row .val{color:#e8dcc8;background:#0e1525;border:1px solid #1e2d45;padding:2px 8px;border-radius:4px;min-width:90px;}
.hint{font-size:9px;color:#5a6a8a;margin-top:8px;border-top:1px solid #1e2d45;padding-top:8px;}
.copy-btn{margin-top:10px;padding:8px;border-radius:7px;border:1px solid rgba(201,162,39,.4);background:rgba(201,162,39,.12);color:#c9a227;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;width:100%;}
.copy-btn:hover{background:rgba(201,162,39,.25);}
</style>
</head>
<body>

<div>
  <div style="font-size:10px;color:#5a6a8a;text-align:center;margin-bottom:8px;">⟵ Glisse les slots sur la silhouette</div>
  <div class="wrap" id="wrap">
    <img src="silhouette-knight.png" draggable="false">
    <div class="slot" id="sl-chapeau"  data-id="chapeau"  style="top:4px;  left:37%"><i class="ra ra-helmet"></i><span class="lbl">Casque</span></div>
    <div class="slot" id="sl-cape"     data-id="cape"     style="top:19%;  left:4%"><span class="lbl">Cape</span></div>
    <div class="slot" id="sl-amulette" data-id="amulette" style="top:19%;  left:64%"><span class="lbl">Amulette</span></div>
    <div class="slot" id="sl-armure"   data-id="armure"   style="top:36%;  left:37%"><i class="ra ra-vest"></i><span class="lbl">Armure</span></div>
    <div class="slot" id="sl-anneau"   data-id="anneau"   style="top:50%;  left:64%"><i class="ra ra-fire-ring"></i><span class="lbl">Anneau</span></div>
    <div class="slot" id="sl-ceinture" data-id="ceinture" style="top:52%;  left:4%"><span class="lbl">Ceinture</span></div>
    <div class="slot" id="sl-bottes"   data-id="bottes"   style="top:76%;  left:37%"><i class="ra ra-boot-stomp"></i><span class="lbl">Bottes</span></div>
  </div>
</div>

<div class="panel">
  <h2>Positions (% du container)</h2>
  <div id="results"></div>
  <div class="hint">300×340px · Glisse un slot pour mettre à jour</div>
  <button class="copy-btn" onclick="copyValues()">📋 Copier les valeurs</button>
</div>

<script>
var WRAP=document.getElementById('wrap');
var slots=document.querySelectorAll('.slot');
var dragging=null,ox=0,oy=0;

function getPct(el){
  var r=WRAP.getBoundingClientRect();
  var top=Math.round((el.offsetTop/r.height)*100);
  var left=Math.round((el.offsetLeft/r.width)*100);
  return {top:top,left:left};
}

function updateResults(){
  var html='';
  slots.forEach(function(sl){
    var p=getPct(sl);
    html+='<div class="row"><span class="name">'+sl.dataset.id+'</span>'
      +'<span class="val">top:'+p.top+'%  left:'+p.left+'%</span></div>';
  });
  document.getElementById('results').innerHTML=html;
}

slots.forEach(function(sl){
  sl.addEventListener('mousedown',function(e){
    e.preventDefault();
    dragging=sl;
    var r=WRAP.getBoundingClientRect();
    ox=e.clientX-sl.getBoundingClientRect().left;
    oy=e.clientY-sl.getBoundingClientRect().top;
  });
});

document.addEventListener('mousemove',function(e){
  if(!dragging)return;
  var r=WRAP.getBoundingClientRect();
  var x=e.clientX-r.left-ox;
  var y=e.clientY-r.top-oy;
  x=Math.max(0,Math.min(r.width-54,x));
  y=Math.max(0,Math.min(r.height-54,y));
  dragging.style.left=x+'px';
  dragging.style.top=y+'px';
  updateResults();
});

document.addEventListener('mouseup',function(){dragging=null;});

function copyValues(){
  var lines=[];
  slots.forEach(function(sl){
    var p=getPct(sl);
    lines.push(sl.dataset.id+': top:'+p.top+'%  left:'+p.left+'%');
  });
  navigator.clipboard.writeText(lines.join('\n')).then(function(){
    var b=document.querySelector('.copy-btn');
    b.textContent='✅ Copié !';
    setTimeout(function(){b.textContent='📋 Copier les valeurs';},2000);
  });
}

updateResults();
</script>
</body></html>
