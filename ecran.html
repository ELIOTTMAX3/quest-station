<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Quest Station — Écran</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/rpg-awesome@0.2.0/css/rpg-awesome.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:#000;font-family:system-ui,sans-serif;color:#e0e0e0;overflow:hidden;cursor:default;}
#root{position:relative;width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;background:#000;}

/* Stage 16:9 letterboxé — taille fixe relative, grille & tokens verrouillés */
#stage{position:relative;aspect-ratio:16/9;width:min(100vw,177.78vh);max-height:100vh;background:#05080f;overflow:hidden;}
#visuel{position:absolute;inset:0;background:#000;display:none;z-index:50;}
#mapbg{position:absolute;inset:0;background-size:cover;background-position:center;}
#mapimg{position:absolute;top:50%;left:50%;width:100%;height:100%;object-fit:cover;transform:translate(-50%,-50%);display:none;}
#grid{position:absolute;inset:0;pointer-events:none;background-image:linear-gradient(rgba(0,0,0,.45) 1px,transparent 1px),linear-gradient(90deg,rgba(0,0,0,.45) 1px,transparent 1px);background-size:4.1667% 7.4074%;transition:opacity .2s;}

.tok{position:absolute;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:50%;transform:translate(-50%,-50%);transition:left .15s linear,top .15s linear;}
.tok.enemy{background:radial-gradient(circle,rgba(239,68,68,.4),rgba(185,28,28,.55));border:3px solid #ef4444;box-shadow:0 0 18px rgba(239,68,68,.5);}
.tok.ally{background:radial-gradient(circle,rgba(74,222,128,.35),rgba(22,101,52,.55));border:3px solid #4ade80;box-shadow:0 0 18px rgba(74,222,128,.4);}
.tok.npc{background:radial-gradient(circle,rgba(201,162,39,.35),rgba(120,80,10,.55));border:3px solid #c9a227;box-shadow:0 0 18px rgba(201,162,39,.4);}
.tok.has-img{background:transparent!important;box-shadow:none!important;border-style:dashed!important;border-width:2px!important;}
.tok.has-img .tl{top:165%;margin-top:0;}
.tok i{pointer-events:none;}
.tok.enemy i{color:#fecaca;}.tok.ally i{color:#bbf7d0;}.tok.npc i{color:#fde68a;}
.tok .tl{position:absolute;top:100%;left:50%;transform:translateX(-50%);margin-top:2px;font-weight:700;color:#fff;text-shadow:0 1px 5px #000,0 0 8px #000;white-space:nowrap;z-index:5;}
.tok .hpb{position:absolute;height:5px;background:rgba(0,0,0,.5);border-radius:3px;}
.tok .hpf{height:100%;border-radius:3px;}


/* Visuel plein écran — position absolue garantie, pas de dépendance flex */
#visuel img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
#visuel .vtitle{display:none;}

#wait{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:60;background:#05080f;}
#wait .logo{font-size:60px;color:#c9a227;}
#wait p{color:#5a6a8a;font-size:16px;}

#fsbtn{position:fixed;bottom:16px;right:16px;z-index:70;width:42px;height:42px;border-radius:9px;border:1px solid #1e2d45;background:rgba(8,14,26,.85);color:#5a6a8a;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:.35;transition:opacity .2s;}
#fsbtn:hover{opacity:1;color:#c9a227;border-color:#c9a227;}
</style>
</head>
<body>
<div id="root">
  <div id="stage">
    <div id="mapbg"></div>
    <img id="mapimg" alt="">
    <div id="grid"></div>
    <div id="tokens"></div>
  </div>
  <div id="visuel"><img id="visuel-img" src=""><div class="vtitle" id="visuel-title"></div></div>
  <!-- Overlay de crossfade : capture l'ancienne scène, se dissipe sur la nouvelle -->
  <div id="cf-overlay" style="position:absolute;inset:0;z-index:200;pointer-events:none;opacity:0;background:#000;">
    <img id="cf-img" style="width:100%;height:100%;object-fit:cover;display:none;">
  </div>
  <div id="wait">
    <div class="logo"><i class="ra ra-crossed-swords"></i></div>
    <p id="wait-msg">Connexion à la partie…</p>
  </div>
  <button id="fsbtn" onclick="toggleFs()" title="Plein écran">⛶</button>
</div>

<script>
function esc(s){return (s||'').replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
function qs(k){var m=new RegExp('[?&]'+k+'=([^&]+)').exec(location.search);return m?decodeURIComponent(m[1]):null;}
function toggleFs(){if(!document.fullscreenElement)document.documentElement.requestFullscreen();else document.exitFullscreen();}
// Re-enter fullscreen si la fenêtre MJ ouvre un file picker et nous fait perdre le focus
var _wasFull=false;
function _tryFullscreen(){
  if(_wasFull&&!document.fullscreenElement)
    document.documentElement.requestFullscreen().catch(function(){});
}
document.addEventListener('fullscreenchange',function(){_wasFull=!!document.fullscreenElement;});
// Récupération plein écran : focus, visibilité, et vérification périodique
window.addEventListener('focus',_tryFullscreen);
document.addEventListener('visibilitychange',function(){if(!document.hidden)_tryFullscreen();});
setInterval(_tryFullscreen,2000);

// ── Crossfade par overlay (pas de fondu au noir) ──
// L'overlay capture l'ancienne scène (img ou fond), la nouvelle s'affiche dessous, l'overlay disparaît
function _applyCrossfade(ms, renderState, combat){
  var overlay=document.getElementById('cf-overlay');
  var cfImg=document.getElementById('cf-img');
  var visuel=document.getElementById('visuel');
  var vimg=document.getElementById('visuel-img');
  var mapimg=document.getElementById('mapimg');
  var mapbg=document.getElementById('mapbg');

  // Capturer l'ancienne scène dans l'overlay
  overlay.style.transition='none';
  if(visuel.style.display==='flex'&&vimg.src){
    cfImg.src=vimg.src;cfImg.style.display='block';overlay.style.background='#000';
  } else if(mapimg.style.display!=='none'&&mapimg.src){
    cfImg.src=mapimg.src;cfImg.style.display='block';overlay.style.background='#000';
  } else {
    cfImg.style.display='none';overlay.style.background=mapbg.style.background||'#05080f';
  }
  overlay.style.opacity='1';

  // Afficher la nouvelle scène (map + grille + tokens) immédiatement en dessous de l'overlay
  _doRender(renderState, combat);

  // Dissiper l'overlay — la nouvelle scène complète (y compris grille) se révèle en sync
  if(!ms){overlay.style.opacity='0';return;}
  requestAnimationFrame(function(){requestAnimationFrame(function(){
    overlay.style.transition='opacity '+(ms/1000).toFixed(2)+'s ease';
    overlay.style.opacity='0';
  });});
}

function render(state, combat){
  var wait=document.getElementById('wait');
  if(!state){wait.style.display='flex';document.getElementById('wait-msg').textContent='En attente du MJ…';return;}
  wait.style.display='none';
  var curtainLifted=(_prevCurtain===true && !state.curtain);
  _prevCurtain=!!state.curtain;
  var isFrozen=(state.curtain && !!state.frozen);
  var renderState=isFrozen ? state.frozen : state;
  if(curtainLifted){
    // Rideau levé : crossfade vers la scène live
    _applyCrossfade(state.fadeMs||0, state, combat);
    _localData.frozenMap=null;_localData.frozenVisuel=null;
    return;
  }
  _doRender(renderState, combat, isFrozen);
}

function _doRender(renderState, combat, isFrozen){
  var rs=renderState;
  // Résoudre les marqueurs locaux — si frozen, utiliser le snapshot figé
  var mapLocal=isFrozen?(_localData.frozenMap||_localData.map):_localData.map;
  var visuelLocal=isFrozen?(_localData.frozenVisuel||_localData.visuel):_localData.visuel;
  var mapVal=rs.map||'';
  if(mapVal==='__local__'){
    mapVal=mapLocal||'';
    if(!mapLocal&&window.opener)window.opener.postMessage({type:'qs_reqLocal'},'*');
  }
  var visuelUrl=rs.visuel==='__local__'?(visuelLocal||null):rs.visuel;

  var showVisuel=rs.mode==='visuel'&&visuelUrl;
  document.getElementById('visuel').style.display=showVisuel?'flex':'none';
  document.getElementById('stage').style.display=showVisuel?'none':'block';

  if(showVisuel){
    document.getElementById('visuel-img').src=visuelUrl;
    return;
  }

  // Grille
  document.getElementById('grid').style.opacity=(rs.grid===false)?'0':'1';

  // Battlemap — image ou fond sombre
  var stage=document.getElementById('stage');
  var SW=stage.clientWidth;
  var mapbg=document.getElementById('mapbg'), mapimg=document.getElementById('mapimg');
  if(mapVal){
    mapbg.style.display='none';mapimg.style.display='block';
    if(mapimg._qsSrc!==mapVal){mapimg._qsSrc=mapVal;mapimg.src=mapVal;}
  } else {
    mapbg.style.background='#05080f';mapbg.style.display='block';mapimg.style.display='none';
  }
  var size=Math.round(SW*0.042);
  var tokens=rs.tokens||{};
  if(rs.tokensVisible===false){document.getElementById('tokens').innerHTML='';return;}
  document.getElementById('tokens').innerHTML=Object.keys(tokens).map(function(id){
    var t=tokens[id];
    if(t.hidden)return '';
    if(t.type==='ally')return ''; // PJ non affichés : figurines physiques posées sur l'écran
    var tSize=t.large?size*2:size;
    var hp='';
    if(t.type!=='enemy' && t.hp!=null && t.maxHp){
      var pct=Math.max(0,Math.round(t.hp/t.maxHp*100));
      var c=pct>50?'#4ade80':pct>25?'#fbbf24':'#ef4444';
      hp='<div class="hpb" style="bottom:-'+Math.round(tSize*0.18)+'px;left:4px;right:4px;"><div class="hpf" style="width:'+pct+'%;background:'+c+'"></div></div>';
    }
    var imgSrc=t.img||((_localData.tokenImgs||{})[id])||null;
    var iconHtml=imgSrc
      ?'<img src="'+imgSrc+'" style="position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);height:180%;width:auto;object-fit:contain;z-index:15;pointer-events:none;" onerror="this.style.display=\'none\'">'
      :'<i class="ra '+(t.icon||'ra-skull')+'" style="font-size:'+Math.round(tSize*0.42)+'px;"></i>';
    return '<div class="tok '+t.type+(imgSrc?' has-img':'')+'" style="left:'+(t.xPct||0)+'%;top:'+(t.yPct||0)+'%;width:'+tSize+'px;height:'+tSize+'px;">'
      +iconHtml
      +'<span class="tl" style="font-size:'+Math.round(tSize*0.2)+'px;">'+esc(t.nom||'')+'</span>'
      +hp
    +'</div>';
  }).join('');

}

// Coordonnées de grille (A-X / 1-13) — générées une fois dans le div #grid
function _buildGridLabels(){
  var g=document.getElementById('grid');if(!g||g._lb)return;g._lb=true;
  var letters='ABCDEFGHIJKLMNOPQRSTUVWX';
  var frag=document.createDocumentFragment();
  var base='position:absolute;font-family:monospace;font-weight:700;pointer-events:none;line-height:1;color:rgba(255,255,255,.28);text-shadow:0 1px 2px rgba(0,0,0,.9);';
  for(var i=0;i<24;i++){
    var s=document.createElement('span');s.textContent=letters[i];
    s.style.cssText=base+'left:'+(i*4.1667+2.0833)+'%;top:.5%;transform:translateX(-50%);font-size:.75vw;';
    frag.appendChild(s);
  }
  for(var j=0;j<13;j++){
    var s=document.createElement('span');s.textContent=j+1;
    s.style.cssText=base+'left:.5%;top:'+(j*7.4074+3.7037)+'%;transform:translateY(-50%);font-size:.75vw;';
    frag.appendChild(s);
  }
  g.appendChild(frag);
}
_buildGridLabels();

var _last=null;
var _localData={map:null,visuel:null,frozenMap:null,frozenVisuel:null,tokenImgs:{}};
var _prevCurtain=null;
window.addEventListener('resize',function(){ if(_last) render(_last.ecran,_last.combat); });
window.addEventListener('message',function(e){
  if(!e.data)return;
  if(e.data.type==='qs_fullscreen'){
    _wasFull=true; // activer avant que focus arrive
    document.documentElement.requestFullscreen().catch(function(){});
    return;
  }
  if(e.data.type==='qs_local'){
    if(e.data.map)   _localData.map=e.data.map;
    if(e.data.visuel)_localData.visuel=e.data.visuel;
    if(e.data.tokenImgs)Object.assign(_localData.tokenImgs,e.data.tokenImgs);
    if(_last)render(_last.ecran,_last.combat);
  } else if(e.data.type==='qs_frozen_local'){
    // Snapshot local figé au moment où le rideau s'est baissé
    if(e.data.map)   _localData.frozenMap=e.data.map;
    if(e.data.visuel)_localData.frozenVisuel=e.data.visuel;
  }
});

function loadScript(src){return new Promise(function(res,rej){var s=document.createElement('script');s.src=src;s.onload=res;s.onerror=rej;document.head.appendChild(s);});}
loadScript("https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js")
.then(function(){return loadScript("https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js");})
.then(function(){
  firebase.initializeApp({
    apiKey:"AIzaSyA5hFSImv5Ti7SDgjiZUBpn8qR3_RFP2Ss",
    authDomain:"quest-station.firebaseapp.com",
    projectId:"quest-station",
    storageBucket:"quest-station.firebasestorage.app",
    messagingSenderId:"382512497035",
    appId:"1:382512497035:web:cfc3de3255e885a1adaf8e"
  });
  var db=firebase.firestore();
  var code=qs('code');
  if(!code){document.getElementById('wait-msg').textContent='Aucun code de partie (?code=…).';return;}
  db.collection('parties').doc(code).onSnapshot(function(snap){
    if(!snap.exists){document.getElementById('wait-msg').textContent='Partie introuvable.';return;}
    var d=snap.data();
    _last={ecran:d.ecran||null, combat:d.combatMJ||null};
    render(_last.ecran,_last.combat);
  },function(e){document.getElementById('wait-msg').textContent='Erreur : '+e.message;});
})
.catch(function(){document.getElementById('wait-msg').textContent='Échec du chargement de Firebase.';});
</script>
</body>
</html>
