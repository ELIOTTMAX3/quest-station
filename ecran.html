<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Quest Station — Écran</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/rpg-awesome@0.2.0/css/rpg-awesome.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:#000;font-family:system-ui,sans-serif;color:#e0e0e0;overflow:hidden;cursor:default;}
#root{position:relative;width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;background:#000;}

/* Stage 16:9 letterboxé — taille fixe relative, grille & tokens verrouillés */
#stage{position:relative;aspect-ratio:16/9;width:min(100vw,177.78vh);max-height:100vh;background:#05080f;overflow:hidden;}
#mapbg{position:absolute;inset:0;background-size:cover;background-position:center;}
#mapimg{position:absolute;top:50%;left:50%;width:100%;height:100%;object-fit:cover;transform:translate(-50%,-50%);display:none;}
#grid{position:absolute;inset:0;pointer-events:none;background-image:linear-gradient(rgba(255,255,255,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.06) 1px,transparent 1px);background-size:4.1667% 7.4074%;}

.tok{position:absolute;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:50%;transform:translate(-50%,-50%);transition:left .15s linear,top .15s linear;}
.tok.enemy{background:radial-gradient(circle,rgba(239,68,68,.4),rgba(185,28,28,.55));border:3px solid #ef4444;box-shadow:0 0 18px rgba(239,68,68,.5);}
.tok.ally{background:radial-gradient(circle,rgba(74,222,128,.35),rgba(22,101,52,.55));border:3px solid #4ade80;box-shadow:0 0 18px rgba(74,222,128,.4);}
.tok.npc{background:radial-gradient(circle,rgba(201,162,39,.35),rgba(120,80,10,.55));border:3px solid #c9a227;box-shadow:0 0 18px rgba(201,162,39,.4);}
.tok i{pointer-events:none;}
.tok.enemy i{color:#fecaca;}.tok.ally i{color:#bbf7d0;}.tok.npc i{color:#fde68a;}
.tok .tl{position:absolute;top:100%;left:50%;transform:translateX(-50%);margin-top:2px;font-weight:700;color:#fff;text-shadow:0 1px 5px #000,0 0 8px #000;white-space:nowrap;z-index:5;}
.tok .hpb{position:absolute;height:5px;background:rgba(0,0,0,.5);border-radius:3px;}
.tok .hpf{height:100%;border-radius:3px;}

#initbar{position:absolute;top:0;left:0;right:0;background:linear-gradient(180deg,rgba(0,0,0,.85),transparent);padding:1.5% 2.5% 3%;display:flex;align-items:center;gap:.7vw;flex-wrap:wrap;z-index:30;}
#initbar .lbl{font-size:1.2vw;font-weight:800;color:#5a6a8a;letter-spacing:.12em;margin-right:6px;}
.ichip{padding:.6vw 1.3vw;border-radius:999px;font-size:1.3vw;font-weight:700;white-space:nowrap;}
.ichip.active{background:#c9a227;color:#000;transform:scale(1.08);box-shadow:0 0 16px rgba(201,162,39,.5);}
.ichip.enemy{background:rgba(239,68,68,.3);border:1px solid rgba(239,68,68,.55);color:#fca5a5;}
.ichip.ally{background:rgba(74,222,128,.22);border:1px solid rgba(74,222,128,.45);color:#86efac;}

/* Visuel plein écran */
#visuel{position:absolute;inset:0;background:#000;display:none;align-items:center;justify-content:center;z-index:50;}
#visuel img{max-width:100%;max-height:100%;object-fit:contain;}
#visuel .vtitle{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(0deg,rgba(0,0,0,.85),transparent);padding:30px 40px 24px;font-size:28px;font-weight:700;color:#c9a227;text-align:center;}

#wait{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:60;background:#05080f;}
#wait .logo{font-size:60px;color:#c9a227;}
#wait p{color:#5a6a8a;font-size:16px;}

#fsbtn{position:fixed;bottom:16px;right:16px;z-index:70;width:42px;height:42px;border-radius:9px;border:1px solid #1e2d45;background:rgba(8,14,26,.85);color:#5a6a8a;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:.35;transition:opacity .2s;}
#fsbtn:hover{opacity:1;color:#c9a227;border-color:#c9a227;}
</style>
</head>
<body>
<div id="root">
  <div id="stage">
    <div id="mapbg"></div>
    <img id="mapimg" alt="">
    <div id="grid"></div>
    <div id="tokens"></div>
    <div id="initbar" style="display:none;"></div>
  </div>
  <div id="visuel"><img id="visuel-img" src=""><div class="vtitle" id="visuel-title"></div></div>
  <div id="wait">
    <div class="logo"><i class="ra ra-crossed-swords"></i></div>
    <p id="wait-msg">Connexion à la partie…</p>
  </div>
  <button id="fsbtn" onclick="toggleFs()" title="Plein écran">⛶</button>
</div>

<script>
var MAPS={
  dungeon:'radial-gradient(ellipse at 30% 40%,#1a1200,#080600 60%,#030200)',
  forest: 'radial-gradient(ellipse at 60% 20%,#071a04,#030d02 60%,#020801)',
  taverne:'radial-gradient(ellipse at 50% 80%,#1a0e00,#0d0700 60%,#060300)',
  crypte: 'radial-gradient(ellipse at 20% 80%,#0d0018,#060010 60%,#030008)',
};
function esc(s){return (s||'').replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
function qs(k){var m=new RegExp('[?&]'+k+'=([^&]+)').exec(location.search);return m?decodeURIComponent(m[1]):null;}
function toggleFs(){if(!document.fullscreenElement)document.documentElement.requestFullscreen();else document.exitFullscreen();}

function mapBgCss(map){
  if(MAPS[map])return MAPS[map];
  return '#05080f center/cover no-repeat url("'+map+'")';
}
// Portrait → paysage automatique (bas à droite = rotation -90°)
function orientImg(img,cw,ch,fit){
  var portrait=img.naturalHeight>img.naturalWidth;
  img.style.objectFit=fit;
  if(portrait){
    img.style.width=ch+'px';img.style.height=cw+'px';
    img.style.transform='translate(-50%,-50%) rotate(-90deg)';
  }else{
    img.style.width=cw+'px';img.style.height=ch+'px';
    img.style.transform='translate(-50%,-50%)';
  }
}

function render(state, combat){
  var wait=document.getElementById('wait');
  if(!state){wait.style.display='flex';document.getElementById('wait-msg').textContent='En attente du MJ…';return;}
  wait.style.display='none';

  var showVisuel = state.mode==='visuel' && state.visuel;
  document.getElementById('visuel').style.display=showVisuel?'flex':'none';
  document.getElementById('root').style.background='#000';
  document.getElementById('stage').style.display=showVisuel?'none':'block';

  if(showVisuel){
    var vimg=document.getElementById('visuel-img');
    vimg.onload=function(){
      if(vimg.naturalHeight>vimg.naturalWidth){ // portrait → paysage, bas à droite
        vimg.style.transform='rotate(-90deg)';
        vimg.style.maxWidth=window.innerHeight+'px';vimg.style.maxHeight=window.innerWidth+'px';
      }else{vimg.style.transform='';vimg.style.maxWidth='100%';vimg.style.maxHeight='100%';}
    };
    vimg.src=state.visuel;
    document.getElementById('visuel-title').textContent=state.visuelLabel||'';
    return;
  }

  // Battlemap — tout est positionné en % du stage 16:9 (verrouillé à toute résolution)
  var stage=document.getElementById('stage');
  var SW=stage.clientWidth, SH=stage.clientHeight;
  var mapVal=state.map||'dungeon';
  var mapbg=document.getElementById('mapbg'), mapimg=document.getElementById('mapimg');
  if(MAPS[mapVal]){
    mapbg.style.background=MAPS[mapVal];mapbg.style.display='block';mapimg.style.display='none';
  }else{
    mapbg.style.display='none';mapimg.style.display='block';
    if(mapimg.getAttribute('data-src')!==mapVal){
      mapimg.setAttribute('data-src',mapVal);
      mapimg.onload=function(){orientImg(mapimg,SW,SH,'cover');};
      mapimg.src=mapVal;
    }else if(mapimg.naturalWidth){orientImg(mapimg,SW,SH,'cover');}
  }
  var size=Math.round(SW*0.042); // token légèrement réduit pour coller aux figurines
  var tokens=state.tokens||{};
  document.getElementById('tokens').innerHTML=Object.keys(tokens).map(function(id){
    var t=tokens[id];
    if(t.hidden)return ''; // masqué aux joueurs
    if(t.type==='ally')return ''; // PJ non affichés : figurines physiques posées sur l'écran
    var hp='';
    if(t.type!=='enemy' && t.hp!=null && t.maxHp){
      var pct=Math.max(0,Math.round(t.hp/t.maxHp*100));
      var c=pct>50?'#4ade80':pct>25?'#fbbf24':'#ef4444';
      hp='<div class="hpb" style="bottom:-'+Math.round(size*0.18)+'px;left:4px;right:4px;"><div class="hpf" style="width:'+pct+'%;background:'+c+'"></div></div>';
    }
    var iconHtml=t.img
      ?'<img src="'+t.img+'" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:50%;" onerror="">'
      :'<i class="ra '+(t.icon||'ra-skull')+'" style="font-size:'+Math.round(size*0.42)+'px;"></i>';
    return '<div class="tok '+t.type+'" style="left:'+(t.xPct||0)+'%;top:'+(t.yPct||0)+'%;width:'+size+'px;height:'+size+'px;">'
      +iconHtml
      +'<span class="tl" style="font-size:'+Math.round(size*0.2)+'px;position:relative;z-index:2;">'+esc((t.nom||'').split(' ')[0])+'</span>'
      +hp
    +'</div>';
  }).join('');

  var ib=document.getElementById('initbar');
  if(combat && combat.combatActif && combat.combatants && combat.combatants.length){
    ib.style.display='flex';
    ib.innerHTML='<span class="lbl">⚔ INITIATIVE</span>'+combat.combatants.map(function(c,i){
      var cls=c.type==='monstre'?'enemy':'ally';
      var active=i===combat.combatTour?' active':'';
      return '<span class="ichip '+cls+active+'">'+esc(c.nom)+(c.init!=null?' ('+c.init+')':'')+'</span>';
    }).join('');
  } else ib.style.display='none';
}

var _last=null;
window.addEventListener('resize',function(){ if(_last) render(_last.ecran,_last.combat); });

function loadScript(src){return new Promise(function(res,rej){var s=document.createElement('script');s.src=src;s.onload=res;s.onerror=rej;document.head.appendChild(s);});}
loadScript("https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js")
.then(function(){return loadScript("https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js");})
.then(function(){
  firebase.initializeApp({
    apiKey:"AIzaSyA5hFSImv5Ti7SDgjiZUBpn8qR3_RFP2Ss",
    authDomain:"quest-station.firebaseapp.com",
    projectId:"quest-station",
    storageBucket:"quest-station.firebasestorage.app",
    messagingSenderId:"382512497035",
    appId:"1:382512497035:web:cfc3de3255e885a1adaf8e"
  });
  var db=firebase.firestore();
  var code=qs('code');
  if(!code){document.getElementById('wait-msg').textContent='Aucun code de partie (?code=…).';return;}
  db.collection('parties').doc(code).onSnapshot(function(snap){
    if(!snap.exists){document.getElementById('wait-msg').textContent='Partie introuvable.';return;}
    var d=snap.data();
    _last={ecran:d.ecran||null, combat:d.combatMJ||null};
    render(_last.ecran,_last.combat);
  },function(e){document.getElementById('wait-msg').textContent='Erreur : '+e.message;});
})
.catch(function(){document.getElementById('wait-msg').textContent='Échec du chargement de Firebase.';});
</script>
</body>
</html>
