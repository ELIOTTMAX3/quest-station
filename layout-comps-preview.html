<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Layout Compétences — Aperçu</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0d1117;font-family:system-ui,sans-serif;font-size:13px;color:#e0e0e0;padding:28px 20px;}
h1{text-align:center;font-size:11px;color:#5a6a8a;letter-spacing:.14em;text-transform:uppercase;margin-bottom:24px;}

/* Composants mock */
.card{background:#16213e;border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:12px 14px;display:flex;flex-direction:column;gap:8px;}
.section-title{font-size:9px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:#5a6a8a;padding-bottom:6px;border-bottom:1px solid rgba(255,255,255,.06);margin-bottom:2px;}
.maitrise-line{font-size:11px;color:#a0b0c8;line-height:1.8;}
.maitrise-line b{color:#e8dcc8;}
.maitrise-line span{color:#c084fc;}
/* Jets de sauvegarde pills */
.jds-row{display:flex;gap:5px;flex-wrap:wrap;}
.jds-pill{flex:1;min-width:44px;background:#0f1e36;border:1px solid rgba(255,255,255,.1);border-radius:7px;padding:6px 4px;text-align:center;}
.jds-pill .val{font-size:16px;font-weight:700;color:#e8dcc8;}
.jds-pill .lbl{font-size:8px;color:#5a6a8a;text-transform:uppercase;letter-spacing:.06em;}
.jds-pill.bon .val{color:#c9a227;}
/* Compétences */
.comp-item{display:flex;align-items:center;gap:6px;padding:2px 0;}
.comp-dot{width:7px;height:7px;border-radius:50%;background:#2a3d5a;flex-shrink:0;}
.comp-dot.on{background:#93c5fd;}
.comp-name{font-size:11px;color:#a0b0c8;flex:1;}
.comp-bar-wrap{width:120px;height:5px;background:#0f1e36;border-radius:3px;overflow:hidden;}
.comp-bar{height:100%;background:linear-gradient(90deg,#1e3a6a,#3d7acc);border-radius:3px;}
.comp-val{font-size:11px;font-weight:700;color:#3d7acc;width:24px;text-align:right;}
/* Capacités */
.cap-item{border:1px solid rgba(255,255,255,.07);border-radius:7px;padding:7px 9px;margin-bottom:4px;}
.cap-header{display:flex;align-items:center;gap:7px;}
.cap-niv{font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;background:#0f1e36;color:#5a6a8a;}
.cap-niv.ok{background:rgba(45,138,78,.2);color:#6ee7a1;}
.cap-nom{font-size:12px;font-weight:700;color:#e8dcc8;}
.cap-class{font-size:9px;color:#5a6a8a;margin-left:auto;}

/* === OPTIONS === */
.option{margin-bottom:48px;}
.option-label{font-size:12px;font-weight:700;color:#c9a227;letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px;}
.option-sub{font-size:10px;color:#5a6a8a;margin-bottom:14px;}

/* Layout grids */
.grid-a{display:grid;grid-template-columns:1fr 1fr;gap:10px;align-items:start;}
.grid-b{display:grid;grid-template-columns:1fr 1.4fr;gap:10px;align-items:start;}
.grid-c{display:grid;grid-template-columns:1.4fr 1fr;gap:10px;align-items:start;}
.col{display:flex;flex-direction:column;gap:10px;}
</style>
</head>
<body>
<h1>Propositions layout 2 colonnes — Compétences & Capacités</h1>

<script>
// Données mock
var jds=[{l:'FOR',v:'+0',bon:false},{l:'DEX',v:'+2',bon:true},{l:'CON',v:'+3',bon:true},{l:'INT',v:'+0',bon:false},{l:'SAG',v:'+0',bon:false},{l:'CHA',v:'+1',bon:false}];
var comps=[
  {n:'Acrobaties',v:'+2',pct:52,on:true},{n:'Discrétion',v:'+2',pct:52,on:true},{n:'Escamotage',v:'+2',pct:52,on:true},
  {n:'Intimidation',v:'+1',pct:38,on:false},{n:'Persuasion',v:'+1',pct:38,on:true},{n:'Représentation',v:'+1',pct:38,on:true},
  {n:'Tromperie',v:'+1',pct:38,on:true},{n:'Arcanes',v:'+0',pct:25,on:false},{n:'Athlétisme',v:'+0',pct:25,on:false},
  {n:'Dressage',v:'+0',pct:25,on:false},{n:'Histoire',v:'+0',pct:25,on:false},{n:'Investigation',v:'+0',pct:25,on:false},
  {n:'Médecine',v:'+0',pct:25,on:false},{n:'Nature',v:'+0',pct:25,on:false},{n:'Perception',v:'+0',pct:25,on:false},
  {n:'Perspicacité',v:'+0',pct:25,on:false},{n:'Religion',v:'+0',pct:25,on:false},{n:'Survie',v:'+0',pct:25,on:false},
];
var caps=[
  {niv:1,nom:'Attaque sournoise',ok:true},{niv:1,nom:'Argot des voleurs',ok:true},{niv:1,nom:'Expertise',ok:true},
  {niv:2,nom:'Ruse',ok:true},{niv:3,nom:'Archétype Roublard',ok:true},{niv:3,nom:'Esquive instinctive',ok:true},
  {niv:4,nom:'Amélioration de carac.',ok:true},{niv:5,nom:'Attaque supplémentaire',ok:true},{niv:5,nom:'Sens du danger',ok:false},
  {niv:7,nom:'Esquive totale',ok:false},{niv:8,nom:'Amélioration de carac.',ok:false},
];

function mkMaitrises(){
  return '<div class="card"><div class="section-title">Maîtrises</div>'
    +'<div class="maitrise-line"><b>Armures :</b> Légères</div>'
    +'<div class="maitrise-line"><b>Armes :</b> Courantes + rapière, épée courte, arbalète de poing</div>'
    +'<div class="maitrise-line"><b>Outils :</b> <span>Outils de voleur</span></div>'
    +'<div class="maitrise-line"><b>Sauvegardes :</b> <span>Dextérité, Intelligence</span></div>'
    +'<div class="maitrise-line"><b>Compétences :</b> 4 parmi Acrobaties, Discrétion…</div>'
    +'</div>';
}
function mkJDS(){
  return '<div class="card"><div class="section-title">Jets de sauvegarde</div>'
    +'<div class="jds-row">'
    +jds.map(function(j){return '<div class="jds-pill'+(j.bon?' bon':'')+'"><div class="val">'+j.v+'</div><div class="lbl">'+j.l+'</div></div>';}).join('')
    +'</div></div>';
}
function mkComps(half){
  var list=half?comps.slice(0,9):comps;
  var list2=half?comps.slice(9):[];
  var html='<div class="card"><div class="section-title">Compétences</div>'
    +list.map(function(c){return '<div class="comp-item"><div class="comp-dot'+(c.on?' on':'')+'"></div><div class="comp-name">'+c.n+'</div><div class="comp-bar-wrap"><div class="comp-bar" style="width:'+c.pct+'%"></div></div><div class="comp-val">'+c.v+'</div></div>';}).join('')
    +'</div>';
  if(half&&list2.length){
    html+='<div class="card">'
      +list2.map(function(c){return '<div class="comp-item"><div class="comp-dot'+(c.on?' on':'')+'"></div><div class="comp-name">'+c.n+'</div><div class="comp-bar-wrap"><div class="comp-bar" style="width:'+c.pct+'%"></div></div><div class="comp-val">'+c.v+'</div></div>';}).join('')
      +'</div>';
  }
  return html;
}
function mkCaps(){
  return '<div class="card"><div class="section-title">Capacités — Niveau 5</div>'
    +caps.map(function(c){return '<div class="cap-item"><div class="cap-header"><span class="cap-niv'+(c.ok?' ok':'')+'">Niv.'+c.niv+'</span><span class="cap-nom">'+c.nom+'</span><span class="cap-class">Roublard</span></div></div>';}).join('')
    +'</div>';
}

document.write(`
<div class="option">
  <div class="option-label">Option 1 — Maîtrises + Compétences | Jets + Capacités</div>
  <div class="option-sub">Colonne gauche : profil complet · Colonne droite : jets &amp; capacités</div>
  <div class="grid-c">
    <div class="col">${mkMaitrises()}${mkComps(false)}</div>
    <div class="col">${mkJDS()}${mkCaps()}</div>
  </div>
</div>

<div class="option">
  <div class="option-label">Option 2 — Jets + Maîtrises + Capacités | Compétences</div>
  <div class="option-sub">Compétences dédiées colonne droite (liste longue isolée)</div>
  <div class="grid-b">
    <div class="col">${mkJDS()}${mkMaitrises()}${mkCaps()}</div>
    <div class="col">${mkComps(false)}</div>
  </div>
</div>

<div class="option">
  <div class="option-label">Option 3 — Split équilibré 50/50</div>
  <div class="option-sub">Compétences coupées en 2 colonnes · Jets + Maîtrises en haut sur toute la largeur</div>
  <div class="col" style="gap:10px;margin-bottom:10px;">${mkJDS()}${mkMaitrises()}</div>
  <div class="grid-a">
    <div class="col">${mkComps(true)}</div>
    <div class="col">${mkCaps()}</div>
  </div>
</div>
`);
</script>
</body>
</html>
