<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Fond -->
  <rect width="512" height="512" rx="96" fill="#1a1a2e"/>
  <!-- Bouclier -->
  <path d="M256 80 L400 140 L400 280 Q400 380 256 440 Q112 380 112 280 L112 140 Z"
        fill="#16213e" stroke="#d97706" stroke-width="10"/>
  <!-- D20 stylisé — triangle central -->
  <polygon points="256,150 340,290 172,290"
           fill="none" stroke="#d97706" stroke-width="8" stroke-linejoin="round"/>
  <!-- Ligne du milieu -->
  <line x1="172" y1="290" x2="256" y2="340" stroke="#d97706" stroke-width="6"/>
  <line x1="340" y1="290" x2="256" y2="340" stroke="#d97706" stroke-width="6"/>
  <line x1="256" y1="150" x2="172" y2="290" stroke="#c9a227" stroke-width="4" opacity="0.6"/>
  <line x1="256" y1="150" x2="340" y2="290" stroke="#c9a227" stroke-width="4" opacity="0.6"/>
  <!-- 20 au centre -->
  <text x="256" y="272" text-anchor="middle" dominant-baseline="middle"
        font-family="system-ui, sans-serif" font-size="72" font-weight="900"
        fill="#d97706" letter-spacing="-4">20</text>
  <!-- QS en bas -->
  <text x="256" y="390" text-anchor="middle" dominant-baseline="middle"
        font-family="system-ui, sans-serif" font-size="38" font-weight="700"
        fill="#c9a227" letter-spacing="6">QUEST</text>
</svg>
